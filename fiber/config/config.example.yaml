server:
  host: "0.0.0.0"
  port: 3000
  debug: false

database:
  driver: postgres   # postgres | mysql | sqlite
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  database: app
  # path: data/app.db  # sqlite 时使用，driver=sqlite 时必填或使用 database 作为文件路径
  sslmode: disable

cache:
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0
    prefix: "app:"
  memory:
    max_count: 10000
    max_bytes: 67108864  # 64MB
